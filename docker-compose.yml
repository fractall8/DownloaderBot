services:
  init-permissions:
    image: busybox
    container_name: init-permissions
    command: sh -c "mkdir -p /logs/redis /logs/worker /logs/api && chmod -R 777 /logs"
    volumes:
      - ./logs:/logs

  redis:
    image: redis:alpine
    container_name: downloaderbot-redis
    restart: always
    command: redis-server --logfile /var/log/redis/redis-server.log --loglevel warning
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
    # Memory limit
    deploy:
      resources:
        limits:
          memory: 256M
  worker:
    container_name: downloaderbot-worker
    build:
      context: .
      dockerfile: ./DownloaderBot.Worker/Dockerfile
    depends_on:
      - redis
    environment:
      - REDIS_CONNECTION=redis
      - BOT_TOKEN=${BOT_TOKEN}
    volumes:
      - ./botsettings.json:/app/botsettings.json
      - ./logs/worker:/app/logs
  api:
    build:
      context: .
      dockerfile: ./DownloaderBot.Api/Dockerfile
    container_name: downloaderbot-api
    restart: always
    depends_on:
      - redis
    environment:
      - BotSettings__SecretToken=${SECRET_TOKEN}
      - BotSettings__HostAddress=${HOST_ADDRESS}
      - REDIS_CONNECTION=redis
      - BOT_TOKEN=${BOT_TOKEN}
    env_file:
      - .env
    volumes:
      - ./botsettings.json:/app/botsettings.json
      - ./logs/api:/app/logs
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
volumes:
  redis_data: