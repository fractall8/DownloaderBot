services:
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  worker:
    restart: always

  api:
    restart: always