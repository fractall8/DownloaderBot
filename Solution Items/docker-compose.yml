services:
  redis:
    image: redis:alpine
    container_name: downloaderbot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Memory limit
    deploy:
      resources:
        limits:
          memory: 256M
  worker:
    container_name: downloaderbot-worker
    build:
      context: .
      dockerfile: ../DownloaderBot.Worker/Dockerfile
    depends_on:
      - redis
    environment:
      - REDIS_CONNECTION=redis
      - BOT_TOKEN=8507624217:AAHb99McQFTHi8ClFQQH9EfzEF1pxnurDic

volumes:
  redis_data: